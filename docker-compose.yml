# ─── Local Development Services ──────────────────────────────────────────────
# Usage:
#   pnpm db:up      → start Postgres
#   pnpm db:down    → stop all services
#
# Data is persisted in a named Docker volume (survives container restarts).
# To reset the database completely:
#   docker compose down -v && pnpm db:up

services:
  postgres:
    image: postgres:16-alpine
    container_name: mono-starter-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: mono
      POSTGRES_PASSWORD: mono
      POSTGRES_DB: mono_starter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mono -d mono_starter']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
